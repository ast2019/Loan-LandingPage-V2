
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وام سفر تی تی شهر | طرح توران</title>
  
<script type="text/javascript">
  window.RAYCHAT_TOKEN = "b3c7e2b1-88ed-44dd-8e00-bb67fb0d777f";
  window.LOAD_TYPE = "SEO_FRIENDLY";
  (function () {
    d = document;
    s = d.createElement("script");
    s.src = "https://widget-react.raychat.io/install/widget.js";
    s.async = 1;
    d.getElementsByTagName("head")[0].appendChild(s);
  })();
</script>
</head>
<body class="text-[#111111] selection:bg-[#ea4037] selection:text-white">
  <div class="scroll-progress" id="progress-bar"></div>
  <div id="root"></div>
  <!-- Vite will inject the module script here correctly during build -->
  <script type="module" src="/index.tsx"></script>
  <script>
    window.addEventListener('scroll', () => {
      const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height) * 100;
      const pb = document.getElementById("progress-bar");
      if(pb) pb.style.width = scrolled + "%";
      
      const reveals = document.querySelectorAll(".reveal");
      for (let i = 0; i < reveals.length; i++) {
        const windowHeight = window.innerHeight;
        const elementTop = reveals[i].getBoundingClientRect().top;
        if (elementTop < windowHeight - 100) {
          reveals[i].classList.add("active");
        }
      }
    });
    window.dispatchEvent(new Event('scroll'));
  </script>
</body>
</html>
